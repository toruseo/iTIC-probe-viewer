name: Sync data to Cloudflare R2

# webgis/app/public/data/ 以下が変わったとき(およびこのワークフロー自身を編集したとき)、
# 内容を Cloudflare R2 バケットへ wrangler でアップロードする。
# CORS は別途バケット側で .github/r2-cors.json を一度適用しておく(README/CLAUDE.md参照)。
#
# 必要な GitHub Secrets:
#   - CLOUDFLARE_API_TOKEN     : Cloudflare ダッシュボード > My Profile > API Tokens で発行(R2 Edit権限)
#   - CLOUDFLARE_ACCOUNT_ID    : ダッシュボード右側に出ている Account ID
#   - R2_BUCKET                : R2 バケット名(public r2.dev URL の pub-<hash> ではなく内部名)

on:
  push:
    branches: [main]
    paths:
      - 'webgis/app/public/data/**'
      - '.github/workflows/r2-sync.yml'
      - '.github/r2-cors.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: r2-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      R2_BUCKET:             ${{ secrets.R2_BUCKET }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Verify required secrets
        run: |
          : "${CLOUDFLARE_API_TOKEN:?CLOUDFLARE_API_TOKEN secret is not set}"
          : "${CLOUDFLARE_ACCOUNT_ID:?CLOUDFLARE_ACCOUNT_ID secret is not set}"
          : "${R2_BUCKET:?R2_BUCKET secret is not set}"

      # CORSポリシーは冪等(同じJSONを何度setしても結果は同じ)なので、毎回流して問題ない。
      # `.github/r2-cors.json` を更新するとpaths trigger経由で自動再適用される。
      - name: Apply CORS policy to bucket
        run: |
          npx --yes wrangler@latest r2 bucket cors set \
            "${R2_BUCKET}" \
            --file .github/r2-cors.json

      - name: Upload data files to R2
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(webgis/app/public/data/*.bin \
                 webgis/app/public/data/meta.json \
                 webgis/app/public/data/vehicles.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::no data files found under webgis/app/public/data/"
            exit 1
          fi
          for f in "${files[@]}"; do
            key=$(basename "$f")
            echo "→ ${R2_BUCKET}/${key}  ($(wc -c < "$f") bytes)"
            # --remote: ローカルのMiniflareエミュレータではなく実R2に書き込む
            # --content-type は明示しないと application/octet-stream が付く(json系もそれでOK、binary.jsはJSON.parseするだけ)
            npx --yes wrangler@latest r2 object put \
              "${R2_BUCKET}/${key}" \
              --file "$f" \
              --remote
          done
          echo "Done. Uploaded ${#files[@]} files."
