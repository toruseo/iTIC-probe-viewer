name: Sync data to Release

# webgis/app/public/data/ 以下が変わったときだけ走り、固定タグ `data` のリリースに
# .bin / meta.json / vehicles.json をミラーする。GitHub Pages 配信ではバンド幅キャップ
# (100 GB/月ソフト) に乗ってしまうので、データ本体はリリースアセット経由で配る。

on:
  push:
    branches: [main]
    paths:
      - 'webgis/app/public/data/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Collect data files
        id: files
        run: |
          shopt -s nullglob
          files=(webgis/app/public/data/*.bin \
                 webgis/app/public/data/meta.json \
                 webgis/app/public/data/vehicles.json)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No data files to upload — exiting."
            exit 1
          fi
          printf '%s\n' "${files[@]}"
          {
            echo 'list<<EOF'
            printf '%s\n' "${files[@]}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t FILES <<< "${{ steps.files.outputs.list }}"
          NOTES="Auto-uploaded probe data bundle. Source commit: ${{ github.sha }}"
          # --latest=false: コードのリリースではなくデータバンドルなので、
          # リポジトリの "Latest release" バッジを乗っ取らないようにする。
          if gh release view data >/dev/null 2>&1; then
            echo "Release 'data' exists — uploading with --clobber."
            gh release upload data "${FILES[@]}" --clobber
            gh release edit data --notes "$NOTES" --latest=false
          else
            echo "Release 'data' missing — creating."
            gh release create data "${FILES[@]}" \
              --title "Probe data bundle" \
              --notes "$NOTES" \
              --latest=false
          fi
