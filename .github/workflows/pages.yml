name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webgis/app
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install
        run: npm install --no-audit --no-fund

      # データ本体はCloudflare R2 (公開r2.devエンドポイント) から配信するので、Pagesアーティファクトには含めない。
      # public/data/README.md は残しておく(リポジトリで開いたときの説明用)。
      - name: Strip bundled data from public/
        run: |
          rm -f public/data/*.bin public/data/meta.json public/data/vehicles.json

      - name: Build
        env:
          # 末尾スラッシュ必須(binary.jsで `${DATA_BASE}<file>` の形で連結する)。
          VITE_DATA_BASE: https://pub-c70c6e1d178e4465853fab101cdc0321.r2.dev/
          # R2はオブジェクト同名で更新するため、コミットSHAをクエリに付けてブラウザ/Cloudflare CDNキャッシュを無効化する。
          VITE_DATA_VERSION: ${{ github.sha }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: webgis/app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
